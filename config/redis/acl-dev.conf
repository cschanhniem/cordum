# Redis ACL configuration for development.
# All named users have full command access but are scoped to their key patterns.
# The default user is kept ON for convenience (redis-cli, debug tools).
#
# Usage: mount as --aclfile /etc/redis/acl.conf in docker-compose.

# Default user for redis-cli and ad-hoc debugging.
user default on >cordum-dev ~* &* +@all

# API Gateway — needs broad key access for jobs, config, rate limiting, DLQ, auth.
user gateway on >cordum-dev ~* &* +@all

# Scheduler — jobs, locks, worker routing, bus idempotency.
user scheduler on >cordum-dev ~* &* +@all

# Safety Kernel — jobs, config, locks.
user safety-kernel on >cordum-dev ~* &* +@all

# Workflow Engine — workflows, runs, jobs, config, delay timers.
user workflow-engine on >cordum-dev ~* &* +@all

# Context Engine — context, results, artifacts, config.
user context-engine on >cordum-dev ~* &* +@all
