# Redis ACL configuration for production.
# Each service gets a dedicated user with minimum-privilege key patterns.
# Dangerous commands (FLUSHALL, FLUSHDB, DEBUG, CONFIG, KEYS, SHUTDOWN) denied.
#
# Usage: mount as --aclfile /etc/redis/acl.conf in docker-compose.
# Passwords: override via REDIS_PASSWORD env var per service.
#
# Key pattern reference:
#   job:*         — Job state, metadata, indexes, traces
#   cfg:*         — Config service documents
#   lock:*        — Distributed locks
#   apikey:*      — API key records and indexes
#   cordum:rl:*   — Rate limiter sliding windows
#   cordum:dlq:*  — Dead-letter queue cleanup lock
#   dlq:*         — DLQ entries and indexes
#   trace:*       — Trace-to-job mappings
#   sys:*         — System worker snapshots
#   wf:*          — Workflow definitions and runs
#   cordum:wf:*   — Workflow delay timers and locks
#   cordum:bus:*  — NATS bus idempotency markers
#   worker:*      — Worker job assignments
#   ctx:*         — Context pointers
#   res:*         — Result pointers
#   art:*         — Artifact storage
#   session:*     — Auth session tokens

# Disable default user — all connections must authenticate as a named user.
user default off

# API Gateway — broadest access: auth, jobs, config, rate limiting, DLQ.
user gateway on >CHANGE_ME_GATEWAY ~apikey:* ~job:* ~cfg:* ~cordum:rl:* ~cordum:dlq:* ~dlq:* ~lock:* ~trace:* ~sys:* ~session:* ~worker:* &* +@read +@write +@set +@sortedset +@hash +@string +@list +@scripting +@transaction +@connection -FLUSHALL -FLUSHDB -DEBUG -CONFIG -KEYS -SHUTDOWN -BGSAVE -BGREWRITEAOF -SLAVEOF -REPLICAOF -CLUSTER -MIGRATE

# Scheduler — job state transitions, locks, bus idempotency, circuit breaker.
user scheduler on >CHANGE_ME_SCHEDULER ~job:* ~lock:* ~worker:* ~cordum:bus:* ~cfg:* &* +@read +@write +@set +@sortedset +@hash +@string +@list +@scripting +@transaction +@connection -FLUSHALL -FLUSHDB -DEBUG -CONFIG -KEYS -SHUTDOWN -BGSAVE -BGREWRITEAOF -SLAVEOF -REPLICAOF -CLUSTER -MIGRATE

# Safety Kernel — reads job metadata, writes safety decisions.
user safety-kernel on >CHANGE_ME_SAFETY ~job:* ~cfg:* ~lock:* &* +@read +@write +@set +@sortedset +@hash +@string +@list +@scripting +@transaction +@connection -FLUSHALL -FLUSHDB -DEBUG -CONFIG -KEYS -SHUTDOWN -BGSAVE -BGREWRITEAOF -SLAVEOF -REPLICAOF -CLUSTER -MIGRATE

# Workflow Engine — runs, definitions, delay timers, job state.
user workflow-engine on >CHANGE_ME_WORKFLOW ~wf:* ~cordum:wf:* ~job:* ~cfg:* ~lock:* &* +@read +@write +@set +@sortedset +@hash +@string +@list +@scripting +@transaction +@connection -FLUSHALL -FLUSHDB -DEBUG -CONFIG -KEYS -SHUTDOWN -BGSAVE -BGREWRITEAOF -SLAVEOF -REPLICAOF -CLUSTER -MIGRATE

# Context Engine — context storage, results, artifacts.
user context-engine on >CHANGE_ME_CONTEXT ~cfg:* ~ctx:* ~res:* ~art:* ~lock:* &* +@read +@write +@set +@sortedset +@hash +@string +@list +@scripting +@transaction +@connection -FLUSHALL -FLUSHDB -DEBUG -CONFIG -KEYS -SHUTDOWN -BGSAVE -BGREWRITEAOF -SLAVEOF -REPLICAOF -CLUSTER -MIGRATE

# Admin user — for ops/maintenance. Change password immediately after setup.
user admin on >CHANGE_ME_ADMIN ~* &* +@all
