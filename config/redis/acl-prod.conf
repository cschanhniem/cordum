user default off
user gateway on >CHANGE_ME_GATEWAY ~apikey:* ~job:* ~cfg:* ~cordum:rl:* ~cordum:dlq:* ~dlq:* ~lock:* ~trace:* ~sys:* ~session:* ~worker:* &* +@read +@write +@set +@sortedset +@hash +@string +@list +@scripting +@transaction +@connection -FLUSHALL -FLUSHDB -DEBUG -CONFIG -KEYS -SHUTDOWN -BGSAVE -BGREWRITEAOF -SLAVEOF -REPLICAOF -CLUSTER -MIGRATE
user scheduler on >CHANGE_ME_SCHEDULER ~job:* ~lock:* ~worker:* ~cordum:bus:* ~cfg:* &* +@read +@write +@set +@sortedset +@hash +@string +@list +@scripting +@transaction +@connection -FLUSHALL -FLUSHDB -DEBUG -CONFIG -KEYS -SHUTDOWN -BGSAVE -BGREWRITEAOF -SLAVEOF -REPLICAOF -CLUSTER -MIGRATE
user safety-kernel on >CHANGE_ME_SAFETY ~job:* ~cfg:* ~lock:* &* +@read +@write +@set +@sortedset +@hash +@string +@list +@scripting +@transaction +@connection -FLUSHALL -FLUSHDB -DEBUG -CONFIG -KEYS -SHUTDOWN -BGSAVE -BGREWRITEAOF -SLAVEOF -REPLICAOF -CLUSTER -MIGRATE
user workflow-engine on >CHANGE_ME_WORKFLOW ~wf:* ~cordum:wf:* ~job:* ~cfg:* ~lock:* &* +@read +@write +@set +@sortedset +@hash +@string +@list +@scripting +@transaction +@connection -FLUSHALL -FLUSHDB -DEBUG -CONFIG -KEYS -SHUTDOWN -BGSAVE -BGREWRITEAOF -SLAVEOF -REPLICAOF -CLUSTER -MIGRATE
user context-engine on >CHANGE_ME_CONTEXT ~cfg:* ~ctx:* ~res:* ~art:* ~lock:* &* +@read +@write +@set +@sortedset +@hash +@string +@list +@scripting +@transaction +@connection -FLUSHALL -FLUSHDB -DEBUG -CONFIG -KEYS -SHUTDOWN -BGSAVE -BGREWRITEAOF -SLAVEOF -REPLICAOF -CLUSTER -MIGRATE
user admin on >CHANGE_ME_ADMIN ~* &* +@all
