# NATS server config for production-mode Docker Compose.
# Requires certificate assets mounted at /etc/cordum/tls:
# - /etc/cordum/tls/ca/ca.crt
# - /etc/cordum/tls/server/tls.crt
# - /etc/cordum/tls/server/tls.key

port: 4222
http_port: 8222

jetstream {
  store_dir: /data/jetstream
  sync_interval: "1s"
}

tls {
  cert_file: /etc/cordum/tls/server/tls.crt
  key_file: /etc/cordum/tls/server/tls.key
  ca_file: /etc/cordum/tls/ca/ca.crt
  verify: true
}

# Authentication — token-based. Override NATS_TOKEN in deployment secrets.
# For production, consider NKey-based auth for stronger security.
authorization {
  token: $NATS_AUTH_TOKEN
}
