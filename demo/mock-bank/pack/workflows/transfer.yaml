id: demo-mock-bank.transfer
name: Mock Bank Transfer
org_id: default
steps:
  validate:
    id: validate
    name: Validate Request
    type: transform
    input:
      amount: "${input.amount}"
      currency: "${input.currency}"
      customer: "${input.customer}"
      reason: "${input.reason}"
      note: "${input.note}"
      requested_by: "${input.requested_by}"

  execute_auto:
    id: execute_auto
    name: Auto-Approve Transfer
    type: worker
    depends_on:
      - validate
    condition: "input.amount <= 50"
    topic: job.demo-mock-bank.transfer
    input:
      amount: "${input.amount}"
      currency: "${input.currency}"
      customer: "${input.customer}"
      reason: "${input.reason}"
      note: "${input.note}"
    meta:
      pack_id: demo-mock-bank
      capability: demo-mock-bank.transfer
      risk_tags:
        - finance
        - transfer
        - low

  approval_gate:
    id: approval_gate
    name: Manager Approval
    type: approval
    depends_on:
      - validate
    condition: "input.amount > 50 && input.amount <= 1000"

  execute_approved:
    id: execute_approved
    name: Execute Approved Transfer
    type: worker
    depends_on:
      - approval_gate
    condition: "input.amount > 50 && input.amount <= 1000"
    topic: job.demo-mock-bank.transfer
    input:
      amount: "${input.amount}"
      currency: "${input.currency}"
      customer: "${input.customer}"
      reason: "${input.reason}"
      note: "${input.note}"
    meta:
      pack_id: demo-mock-bank
      capability: demo-mock-bank.transfer
      risk_tags:
        - finance
        - transfer
        - review

  block:
    id: block
    name: Policy Block
    type: transform
    depends_on:
      - validate
    condition: "input.amount > 1000"
    input:
      blocked: true
      reason: "Transfers over $1,000 are blocked by policy."
      amount: "${input.amount}"
      customer: "${input.customer}"
