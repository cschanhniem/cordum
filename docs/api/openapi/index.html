<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cordum API - OpenAPI</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui.css" />
    <style>
      body {
        margin: 0;
        background: #f8fafc;
        color: #0f172a;
        font-family: "IBM Plex Sans", "Space Grotesk", "Helvetica Neue", Arial, sans-serif;
      }
      .header {
        padding: 20px 24px 0;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .header select {
        font-size: 14px;
        padding: 4px 8px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: #fff;
      }
      #swagger-ui {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <span>Cordum OpenAPI</span>
      <select id="spec-select">
        <option value="cordum-rest.yaml">REST API (HTTP)</option>
        <option value="cordum.swagger.json">gRPC Gateway (Protobuf)</option>
      </select>
    </div>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui-bundle.js" crossorigin></script>
    <script>
      function loadSpec(file) {
        const specUrl = new URL(file, window.location.href).toString();
        window.ui = SwaggerUIBundle({
          url: specUrl,
          dom_id: "#swagger-ui",
          deepLinking: true,
          docExpansion: "none",
          presets: [SwaggerUIBundle.presets.apis],
          layout: "BaseLayout",
          validatorUrl: null,
        });
      }

      window.addEventListener("load", () => {
        const select = document.getElementById("spec-select");
        loadSpec(select.value);
        select.addEventListener("change", () => loadSpec(select.value));
      });
    </script>
  </body>
</html>
