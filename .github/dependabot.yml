version: 2
updates:
  # Keep SHA-pinned third-party GitHub Actions current via reviewable PRs.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Keep Go module dependencies current.
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      go-deps:
        patterns:
          - "*"

  # Keep dashboard npm dependencies current.
  - package-ecosystem: "npm"
    directory: "/dashboard"
    schedule:
      interval: "weekly"
    groups:
      dashboard-deps:
        patterns:
          - "*"
