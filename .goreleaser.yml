        -X github.com/cordum/cordum/core/infra/buildinfo.Commit={{ .Commit }}
        -X github.com/cordum/cordum/core/infra/buildinfo.Date={{ .Date }}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Binary }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs(\\(.+\\))?:"
      - "^test(\\(.+\\))?:"
      - "^chore(\\(.+\\))?:"
  groups:
    - title: Features
      regexp: "^feat(\\(.+\\))?:"
      order: 0
    - title: Fixes
      regexp: "^fix(\\(.+\\))?:"
      order: 1
    - title: Other
      order: 999

snapshot:
  version_template: "{{ .Tag }}-next"

release:
  draft: false
  prerelease: auto
