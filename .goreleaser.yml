version: 2

project_name: cordum

builds:
  - id: cordum-api-gateway
    main: ./cmd/cordum-api-gateway
    binary: cordum-api-gateway
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - >-
        -s -w
        -X github.com/cordum/cordum/core/infra/buildinfo.Version={{ .Version }}
        -X github.com/cordum/cordum/core/infra/buildinfo.Commit={{ .Commit }}
        -X github.com/cordum/cordum/core/infra/buildinfo.Date={{ .Date }}

  - id: cordum-context-engine
