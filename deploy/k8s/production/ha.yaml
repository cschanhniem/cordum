apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cordum-api-gateway
  namespace: cordum
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: cordum-api-gateway
---
apiVersion: policy/v1
kind: PodDisruptionBudget
