---
# NOTE: NATS routes are hardcoded for 3 nodes (cordum-nats-{0,1,2}) in nats.yaml.
# Scaling NATS beyond 3 nodes requires updating the route list in
# deploy/k8s/production/nats.yaml to include additional peer addresses.
#
# NATS cluster: 3 nodes, minAvailable 2 maintains quorum during node drains.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cordum-nats-pdb
  namespace: cordum
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: nats
---
# Redis cluster: 6 nodes (3 primary + 3 replica), minAvailable 4 maintains
# data availability during rolling upgrades and node maintenance.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cordum-redis-pdb
  namespace: cordum
spec:
  minAvailable: 4
  selector:
    matchLabels:
      app: redis
